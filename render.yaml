databases:
  - name: autolog-db
    plan: free
    databaseName: autolog
    user: autolog

services:
  - type: web
    name: autolog
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: autolog-db
          property: connectionString
